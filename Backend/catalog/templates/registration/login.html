<!DOCTYPE html>
<html>
<head>
    <title>Đăng nhập - Thư viện</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="d-flex align-items-center py-4 bg-light">
    <main class="form-signin w-100 m-auto" style="max-width: 330px;">
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <h1 class="h3 mb-3 fw-normal text-center">Vui lòng đăng nhập</h1>
            
            <div class="form-floating mb-2">
                <input type="text" name="username" class="form-control" id="id_username" placeholder="Username">
                <label for="id_username">Tên đăng nhập</label>
            </div>
            <div class="form-floating mb-3">
                <input type="password" name="password" class="form-control" id="id_password" placeholder="Password">
                <label for="id_password">Mật khẩu</label>
            </div>

            <button class="w-100 btn btn-lg btn-primary" type="submit">Đăng nhập</button>
            <input type="hidden" name="next" value="{{ next }}">
        </form>
    </main>
</body>
</html>
