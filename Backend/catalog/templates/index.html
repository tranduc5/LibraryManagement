<!DOCTYPE html>
<html>

<head>
    <title>Thư viện số - Trần Đức</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

</head>

<body class="container mt-5">
    <h1 class="text-primary"> Danh sách sách trong thư viện</h1>
    <hr>
    <div class="d-flex justify-content-end mb-3">
        {% if user.is_authenticated %}
        <span class="me-3">Chào, <strong>{{ user.username }}</strong>!</span>
        <form method="post" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-danger btn-sm">Đăng xuất</button>
        </form>
        {% else %}
        <a href="{% url 'login' %}?next={{request.path}}" class="btn btn-primary">Đăng nhập</a>
        {% endif %}
    </div>
    <table class="table table-striped mt-4">
        <thead>
            <tr>
                <th>Tên sách</th>
                <th>Tác giả</th>
                <th>ISBN</th> <!-- Mã số sách-->
            </tr>
        </thead>
        <tbody>
            {% for book in book_list %}
            <tr>
                <td><strong>{{ book.title}}</strong></td>
                <td>{{ book.author }}</td>
                <td>{{ book.isbn }}</td>
            </tr>
            {%empty%}
            <tr>
                <td colspan="3"> Hiện chưa có sách nào trong thư viện </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</body>

</html>
